<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Carte Vizzia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0b10;
  color: #e2e4e9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#loading {
  text-align: center;
  color: #8b8f98;
}
#sign-in-container {
  min-width: 360px;
}
</style>
</head>
<body>
  <div id="loading">Chargement...</div>
  <div id="sign-in-container"></div>

  <!-- IMPORTANT: Replace pk_YOUR_PUBLISHABLE_KEY with your Clerk publishable key -->
  <script
    data-clerk-publishable-key="pk_test_aW1wcm92ZWQtc3RhZy0yOS5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://improved-stag-29.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script>
    window.addEventListener('load', function() {
      var Clerk = window.Clerk;
      Clerk.load().then(function() {
        document.getElementById('loading').style.display = 'none';
        if (Clerk.user) {
          // Check email domain before redirecting
          var email = Clerk.user.primaryEmailAddress ? Clerk.user.primaryEmailAddress.emailAddress : '';
          if (email.endsWith('@vizzia.fr')) {
            window.location.href = '/';
            return;
          }
          // Wrong domain — sign out and show login again
          Clerk.signOut({ redirectUrl: '/sign-in' }).then(function() {
            document.getElementById('sign-in-container').insertAdjacentHTML('beforebegin',
              '<p style="color:#e8913a;margin-bottom:16px;text-align:center">Seules les adresses <strong>@vizzia.fr</strong> sont autorisées.</p>'
            );
            Clerk.mountSignIn(document.getElementById('sign-in-container'), {
              appearance: { variables: { colorPrimary: '#4ecdc4', colorBackground: '#111318', colorText: '#e2e4e9', colorTextSecondary: '#8b8f98', colorInputBackground: 'rgba(255,255,255,0.06)', colorInputText: '#e2e4e9' } }
            });
          });
          return;
        } else {
          Clerk.mountSignIn(document.getElementById('sign-in-container'), {
            appearance: {
              variables: {
                colorPrimary: '#4ecdc4',
                colorBackground: '#111318',
                colorText: '#e2e4e9',
                colorTextSecondary: '#8b8f98',
                colorInputBackground: 'rgba(255,255,255,0.06)',
                colorInputText: '#e2e4e9',
              }
            }
          });
        }
      });
    });
  </script>
</body>
</html>
